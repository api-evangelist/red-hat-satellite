openapi: 3.1.0
info:
  title: Red Hat Satellite REST API
  description: >-
    The Red Hat Satellite REST API provides programmatic access to Red Hat
    Satellite server functionality including host management, content view
    management, subscription management, lifecycle environments, and
    provisioning. The API is built on the Foreman and Katello upstream projects
    and follows RESTful conventions with JSON request and response bodies.
  version: 6.18.0
  contact:
    name: Red Hat Support
    url: https://access.redhat.com/support
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
  x-logo:
    url: https://www.redhat.com/profiles/rh/themes/redhatdotcom/img/logo.png
externalDocs:
  description: Red Hat Satellite API Documentation
  url: https://docs.redhat.com/en/documentation/red_hat_satellite/6.18/html/using_the_satellite_rest_api/index
servers:
  - url: https://satellite.example.com
    description: Red Hat Satellite Server
security:
  - basicAuth: []
  - oAuth2: []
tags:
  - name: Hosts
    description: >-
      Manage hosts registered with Red Hat Satellite including physical,
      virtual, and cloud instances.
    externalDocs:
      url: https://apidocs.theforeman.org/foreman/latest/apidoc/v2/hosts.html
  - name: Content Views
    description: >-
      Manage content views which define curated sets of repositories and
      packages available to hosts.
    externalDocs:
      url: https://apidocs.theforeman.org/katello/latest/apidoc/v2/content_views.html
  - name: Subscriptions
    description: >-
      Manage Red Hat subscriptions and entitlements for organizations and
      hosts.
    externalDocs:
      url: https://apidocs.theforeman.org/katello/latest/apidoc/v2/subscriptions.html
  - name: Lifecycle Environments
    description: >-
      Manage lifecycle environments that define promotion paths for content
      views from development through production.
    externalDocs:
      url: https://apidocs.theforeman.org/katello/latest/apidoc/v2/lifecycle_environments.html
  - name: Organizations
    description: >-
      Manage organizations which provide multi-tenancy isolation for hosts,
      content, and subscriptions.
    externalDocs:
      url: https://apidocs.theforeman.org/foreman/latest/apidoc/v2/organizations.html
paths:
  /api/v2/hosts:
    get:
      operationId: listHosts
      summary: List all hosts
      description: >-
        Retrieve a paginated list of all hosts registered with the Satellite
        server. Supports filtering by organization, location, host group, and
        search queries.
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/organizationIdQuery'
        - $ref: '#/components/parameters/locationIdQuery'
        - name: hostgroup_id
          in: query
          description: Filter hosts by host group identifier.
          schema:
            type: integer
        - name: thin
          in: query
          description: Only return the ID and name of each host.
          schema:
            type: boolean
            default: false
        - name: include
          in: query
          description: 'Additional information to include (e.g., parameters, all_parameters).'
          schema:
            type: string
            enum:
              - parameters
              - all_parameters
        - $ref: '#/components/parameters/searchQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
      responses:
        '200':
          description: Successful response containing a list of hosts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of hosts matching the query.
                  subtotal:
                    type: integer
                    description: Number of hosts after filtering.
                  page:
                    type: integer
                    description: Current page number.
                  per_page:
                    type: integer
                    description: Number of results per page.
                  search:
                    type:
                      - string
                      - 'null'
                    description: Applied search filter.
                  sort:
                    type: object
                    properties:
                      by:
                        type:
                          - string
                          - 'null'
                      order:
                        type:
                          - string
                          - 'null'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Host'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createHost
      summary: Create a host
      description: >-
        Register a new host with the Satellite server. The host can be managed
        (provisioned and configured by Satellite) or unmanaged (inventory
        only).
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/organizationIdQuery'
        - $ref: '#/components/parameters/locationIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - host
              properties:
                host:
                  $ref: '#/components/schemas/HostCreate'
      responses:
        '201':
          description: Host created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/hosts/{id}:
    get:
      operationId: showHost
      summary: Show a host
      description: Retrieve details for a specific host by its identifier.
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/hostId'
      responses:
        '200':
          description: Successful response containing host details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateHost
      summary: Update a host
      description: Update the attributes of an existing host.
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/hostId'
        - $ref: '#/components/parameters/organizationIdQuery'
        - $ref: '#/components/parameters/locationIdQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - host
              properties:
                host:
                  $ref: '#/components/schemas/HostUpdate'
      responses:
        '200':
          description: Host updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteHost
      summary: Delete a host
      description: Remove a host from the Satellite server.
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/hostId'
      responses:
        '200':
          description: Host deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/hosts/{id}/power:
    put:
      operationId: hostPowerAction
      summary: Execute a power operation on a host
      description: >-
        Perform a power management action on a host such as powering on,
        powering off, or rebooting. Requires a BMC or compute resource
        association.
      tags:
        - Hosts
      parameters:
        - $ref: '#/components/parameters/hostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - power_action
              properties:
                power_action:
                  type: string
                  description: Power action to perform.
                  enum:
                    - start
                    - stop
                    - reboot
                    - status
      responses:
        '200':
          description: Power action executed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  power:
                    type: string
                  id:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /katello/api/v2/content_views:
    get:
      operationId: listContentViews
      summary: List content views
      description: >-
        Retrieve a paginated list of content views for an organization.
        Content views define curated collections of repositories whose
        packages, errata, and other content are made available to hosts.
      tags:
        - Content Views
      parameters:
        - $ref: '#/components/parameters/organizationIdQuery'
        - name: environment_id
          in: query
          description: Filter by lifecycle environment identifier.
          schema:
            type: integer
        - name: nondefault
          in: query
          description: Filter out default content views.
          schema:
            type: boolean
        - name: noncomposite
          in: query
          description: Filter out composite content views.
          schema:
            type: boolean
        - name: composite
          in: query
          description: Filter only composite content views.
          schema:
            type: boolean
        - name: name
          in: query
          description: Filter by content view name.
          schema:
            type: string
        - name: label
          in: query
          description: Filter by content view label.
          schema:
            type: string
        - name: include_generated
          in: query
          description: Include import/export generated content views.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/searchQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
      responses:
        '200':
          description: Successful response containing a list of content views.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  subtotal:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  search:
                    type:
                      - string
                      - 'null'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContentView'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createContentView
      summary: Create a content view
      description: >-
        Create a new content view for an organization. Content views can be
        standard (selecting individual repositories) or composite (combining
        published versions of other content views).
      tags:
        - Content Views
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentViewCreate'
      responses:
        '201':
          description: Content view created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentView'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/content_views/{id}:
    get:
      operationId: showContentView
      summary: Show a content view
      description: Retrieve details for a specific content view.
      tags:
        - Content Views
      parameters:
        - $ref: '#/components/parameters/contentViewId'
      responses:
        '200':
          description: Successful response containing content view details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentView'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateContentView
      summary: Update a content view
      description: Update an existing content view's attributes.
      tags:
        - Content Views
      parameters:
        - $ref: '#/components/parameters/contentViewId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentViewUpdate'
      responses:
        '200':
          description: Content view updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentView'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      operationId: deleteContentView
      summary: Delete a content view
      description: >-
        Delete a content view. The content view must not be associated with
        any lifecycle environments or activation keys.
      tags:
        - Content Views
      parameters:
        - $ref: '#/components/parameters/contentViewId'
      responses:
        '200':
          description: Content view deleted successfully.
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/content_views/{id}/publish:
    post:
      operationId: publishContentView
      summary: Publish a content view
      description: >-
        Publish a new version of a content view. This creates a snapshot of
        the current repository content and makes it available for promotion
        to lifecycle environments.
      tags:
        - Content Views
      parameters:
        - $ref: '#/components/parameters/contentViewId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Description for the new published version.
                major:
                  type: integer
                  description: Override the major version number.
                minor:
                  type: integer
                  description: Override the minor version number.
                repos_units:
                  type: array
                  description: >-
                    List of repository and unit pairs to include in the
                    publish.
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                      rpm_filenames:
                        type: array
                        items:
                          type: string
      responses:
        '202':
          description: >-
            Content view publish task accepted. Returns a task object for
            tracking the asynchronous publish operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForemanTask'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/content_view_versions/{id}/promote:
    post:
      operationId: promoteContentViewVersion
      summary: Promote a content view version
      description: >-
        Promote a published content view version to a lifecycle environment.
        This makes the content available to hosts in that environment.
      tags:
        - Content Views
      parameters:
        - name: id
          in: path
          required: true
          description: Content view version identifier.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - environment_ids
              properties:
                environment_ids:
                  type: array
                  description: >-
                    Identifiers of the lifecycle environments to promote to.
                  items:
                    type: integer
                description:
                  type: string
                  description: Description for the promotion.
                force:
                  type: boolean
                  description: Force promotion even if validation fails.
                  default: false
      responses:
        '202':
          description: >-
            Content view version promotion task accepted. Returns a task
            object for tracking the asynchronous operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForemanTask'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /katello/api/v2/organizations/{organization_id}/subscriptions:
    get:
      operationId: listSubscriptions
      summary: List organization subscriptions
      description: >-
        Retrieve a paginated list of subscriptions for an organization.
        Subscriptions represent Red Hat product entitlements that can be
        attached to hosts.
      tags:
        - Subscriptions
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
        - name: host_id
          in: query
          description: Filter subscriptions by host identifier.
          schema:
            type: string
        - name: activation_key_id
          in: query
          description: Filter subscriptions by activation key identifier.
          schema:
            type: string
        - name: name
          in: query
          description: Filter by subscription name.
          schema:
            type: string
        - name: available_for
          in: query
          description: >-
            Object type to show available subscriptions for (host or
            activation_key).
          schema:
            type: string
            enum:
              - host
              - activation_key
        - name: match_host
          in: query
          description: >-
            Ignore subscriptions not applicable to the specified host.
          schema:
            type: boolean
        - name: match_installed
          in: query
          description: >-
            Return only subscriptions matching installed products on the
            host.
          schema:
            type: boolean
        - name: no_overlap
          in: query
          description: >-
            Exclude subscriptions that overlap with existing host
            attachments.
          schema:
            type: boolean
        - $ref: '#/components/parameters/searchQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
      responses:
        '200':
          description: Successful response containing a list of subscriptions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  subtotal:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/organizations/{organization_id}/subscriptions/upload:
    post:
      operationId: uploadSubscriptionManifest
      summary: Upload a subscription manifest
      description: >-
        Upload a Red Hat subscription manifest file to import subscriptions
        into an organization.
      tags:
        - Subscriptions
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  format: binary
                  description: Subscription manifest file (.zip).
                repository_url:
                  type: string
                  description: Custom CDN URL for content.
      responses:
        '202':
          description: Manifest upload task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForemanTask'
        '400':
          description: Invalid manifest or upload error.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/organizations/{organization_id}/subscriptions/delete_manifest:
    post:
      operationId: deleteSubscriptionManifest
      summary: Delete a subscription manifest
      description: >-
        Delete the subscription manifest from an organization, removing all
        imported subscriptions.
      tags:
        - Subscriptions
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      responses:
        '202':
          description: Manifest deletion task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForemanTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/organizations/{organization_id}/subscriptions/refresh_manifest:
    put:
      operationId: refreshSubscriptionManifest
      summary: Refresh a subscription manifest
      description: >-
        Refresh the subscription manifest for an organization to sync
        changes from the Red Hat Customer Portal.
      tags:
        - Subscriptions
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      responses:
        '202':
          description: Manifest refresh task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForemanTask'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/organizations/{organization_id}/environments:
    get:
      operationId: listLifecycleEnvironments
      summary: List lifecycle environments
      description: >-
        Retrieve a list of lifecycle environments for an organization.
        Lifecycle environments define the content promotion path from
        Library through development, testing, and production stages.
      tags:
        - Lifecycle Environments
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
        - name: library
          in: query
          description: Include the Library lifecycle environment.
          schema:
            type: boolean
        - name: name
          in: query
          description: Filter by lifecycle environment name.
          schema:
            type: string
        - name: label
          in: query
          description: Filter by lifecycle environment label.
          schema:
            type: string
        - $ref: '#/components/parameters/searchQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
      responses:
        '200':
          description: >-
            Successful response containing a list of lifecycle
            environments.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  subtotal:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/LifecycleEnvironment'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createLifecycleEnvironment
      summary: Create a lifecycle environment
      description: >-
        Create a new lifecycle environment within an organization's content
        promotion path.
      tags:
        - Lifecycle Environments
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - prior_id
              properties:
                name:
                  type: string
                  description: Name of the lifecycle environment.
                label:
                  type: string
                  description: >-
                    Label for the lifecycle environment (auto-generated
                    from name if omitted).
                description:
                  type: string
                  description: Description of the lifecycle environment.
                prior_id:
                  type: integer
                  description: >-
                    Identifier of the prior lifecycle environment in the
                    promotion path.
      responses:
        '201':
          description: Lifecycle environment created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleEnvironment'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /katello/api/v2/organizations/{organization_id}/environments/paths:
    get:
      operationId: listLifecycleEnvironmentPaths
      summary: List lifecycle environment paths
      description: >-
        Retrieve the lifecycle environment promotion paths for an
        organization, showing the sequence of environments content views
        are promoted through.
      tags:
        - Lifecycle Environments
      parameters:
        - name: organization_id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      responses:
        '200':
          description: >-
            Successful response containing lifecycle environment paths.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    environments:
                      type: array
                      items:
                        $ref: '#/components/schemas/LifecycleEnvironment'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/organizations:
    get:
      operationId: listOrganizations
      summary: List organizations
      description: >-
        Retrieve a list of all organizations. Organizations provide
        multi-tenancy isolation for content, hosts, and subscriptions.
      tags:
        - Organizations
      parameters:
        - $ref: '#/components/parameters/searchQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/pageQuery'
        - $ref: '#/components/parameters/perPageQuery'
      responses:
        '200':
          description: Successful response containing a list of organizations.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  subtotal:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/organizations/{id}:
    get:
      operationId: showOrganization
      summary: Show an organization
      description: Retrieve details for a specific organization.
      tags:
        - Organizations
      parameters:
        - name: id
          in: path
          required: true
          description: Organization identifier.
          schema:
            type: integer
      responses:
        '200':
          description: Successful response containing organization details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using Satellite username and password.
    oAuth2:
      type: oauth2
      description: >-
        OAuth 2.0 Personal Access Token authentication for Satellite
        users.
      flows:
        implicit:
          authorizationUrl: https://satellite.example.com/users/extlogin
          scopes: {}
  parameters:
    hostId:
      name: id
      in: path
      required: true
      description: Host identifier (numeric ID or FQDN).
      schema:
        type: string
    contentViewId:
      name: id
      in: path
      required: true
      description: Content view identifier.
      schema:
        type: integer
    organizationIdQuery:
      name: organization_id
      in: query
      description: Set the current organization context for the request.
      schema:
        type: integer
    locationIdQuery:
      name: location_id
      in: query
      description: Set the current location context for the request.
      schema:
        type: integer
    searchQuery:
      name: search
      in: query
      description: >-
        Scoped search query string to filter results. Supports field-based
        search syntax (e.g., "name ~ web*").
      schema:
        type: string
    orderQuery:
      name: order
      in: query
      description: >-
        Sort field and direction (e.g., "name ASC" or "id DESC").
      schema:
        type: string
    pageQuery:
      name: page
      in: query
      description: Page number for paginated results (starting at 1).
      schema:
        type: integer
        minimum: 1
        default: 1
    perPageQuery:
      name: per_page
      in: query
      description: >-
        Number of results per page. Use "all" to retrieve all results
        without pagination.
      schema:
        oneOf:
          - type: integer
            minimum: 1
          - type: string
            enum:
              - all
        default: 20
  schemas:
    Host:
