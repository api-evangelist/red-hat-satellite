          format: ipv4
        ip6:
          type:
            - string
            - 'null'
          description: Primary IPv6 address of the host.
          format: ipv6
        mac:
          type:
            - string
            - 'null'
          description: Primary MAC address of the host.
        environment_id:
          type:
            - integer
            - 'null'
          description: Puppet environment identifier.
        hostgroup_id:
          type:
            - integer
            - 'null'
          description: Host group identifier.
        hostgroup_name:
          type:
            - string
            - 'null'
          description: Host group name.
        hostgroup_title:
          type:
            - string
            - 'null'
          description: >-
            Full host group title including parent groups.
        operatingsystem_id:
          type:
            - integer
            - 'null'
          description: Operating system identifier.
        operatingsystem_name:
          type:
            - string
            - 'null'
          description: Operating system name and version.
        architecture_id:
          type:
            - integer
            - 'null'
          description: Architecture identifier.
        architecture_name:
          type:
            - string
            - 'null'
          description: Architecture name (e.g., x86_64).
        domain_id:
          type:
            - integer
            - 'null'
          description: DNS domain identifier.
        domain_name:
          type:
            - string
            - 'null'
          description: DNS domain name.
        subnet_id:
          type:
            - integer
            - 'null'
          description: IPv4 subnet identifier.
        subnet_name:
          type:
            - string
            - 'null'
          description: IPv4 subnet name.
        subnet6_id:
          type:
            - integer
            - 'null'
          description: IPv6 subnet identifier.
        compute_resource_id:
          type:
            - integer
            - 'null'
          description: >-
            Compute resource identifier. Null for bare metal hosts.
        compute_resource_name:
          type:
            - string
            - 'null'
          description: Compute resource name.
        compute_profile_id:
          type:
            - integer
            - 'null'
          description: Compute profile identifier.
        medium_id:
          type:
            - integer
            - 'null'
          description: Installation medium identifier.
        ptable_id:
          type:
            - integer
            - 'null'
          description: Partition table identifier.
        model_id:
          type:
            - integer
            - 'null'
          description: Hardware model identifier.
        model_name:
          type:
            - string
            - 'null'
          description: Hardware model name.
        location_id:
          type: integer
          description: Location identifier.
        location_name:
          type: string
          description: Location name.
        organization_id:
          type: integer
          description: Organization identifier.
        organization_name:
          type: string
          description: Organization name.
        owner_id:
          type:
            - integer
            - 'null'
          description: Owner identifier.
        owner_type:
          type:
            - string
            - 'null'
          description: Owner type (User or Usergroup).
          enum:
            - User
            - Usergroup
            - null
        managed:
          type: boolean
          description: >-
            Whether the host is managed by Satellite for provisioning and
            configuration.
        build:
          type: boolean
          description: Whether the host is in build mode.
        enabled:
          type: boolean
          description: >-
            Whether configuration management reports are evaluated for
            this host.
        comment:
          type:
            - string
            - 'null'
          description: Additional information about the host.
        uuid:
          type:
            - string
            - 'null'
          description: Unique identifier from compute resource.
        global_status:
          type: integer
          description: >-
            Global status of the host (0=OK, 1=Warning, 2=Error).
        global_status_label:
          type: string
          description: Human-readable global status label.
          enum:
            - OK
            - Warning
            - Error
        content_facet_attributes:
          type: object
          description: >-
            Content-related attributes from the Katello content facet.
          properties:
            id:
              type: integer
            content_view_id:
              type: integer
            content_view_name:
              type: string
            lifecycle_environment_id:
              type: integer
            lifecycle_environment_name:
              type: string
            content_source_id:
              type:
                - integer
                - 'null'
            errata_counts:
              type: object
              properties:
                security:
                  type: integer
                bugfix:
                  type: integer
                enhancement:
                  type: integer
                total:
                  type: integer
            applicable_errata_count:
              type: integer
            upgradable_package_count:
              type: integer
        subscription_facet_attributes:
          type: object
          description: >-
            Subscription-related attributes from the Katello subscription
