          description: Organization this subscription belongs to.
        provided_products:
          type: array
          description: Products provided by this subscription.
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
