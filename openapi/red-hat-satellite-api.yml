        name:
          type: string
          description: Organization name.
        label:
          type: string
          description: Unique label for the organization.
        title:
          type: string
          description: Organization title.
        description:
          type:
            - string
            - 'null'
          description: Organization description.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ForemanTask:
      type: object
      description: >-
        An asynchronous task object returned for long-running operations
        such as publishing content views or uploading manifests.
      properties:
        id:
          type: string
          format: uuid
          description: Unique task identifier.
        label:
          type: string
          description: Machine-readable task label.
        pending:
          type: boolean
          description: Whether the task is still pending.
        action:
          type: string
          description: Human-readable description of the task action.
        username:
          type: string
          description: User who initiated the task.
        state:
          type: string
          description: Current state of the task.
          enum:
            - planned
            - running
            - paused
            - stopped
        result:
          type: string
          description: Result of the task.
          enum:
            - pending
            - success
            - error
            - warning
        progress:
          type: number
          description: Task progress as a decimal (0.0 to 1.0).
          minimum: 0
          maximum: 1
        started_at:
          type:
            - string
            - 'null'
          format: date-time
        ended_at:
          type:
            - string
            - 'null'
          format: date-time
        humanized:
          type: object
          properties:
            action:
              type: string
            input:
              type: array
              items:
                type: string
            output:
              type: string
            errors:
              type: array
              items:
                type: string
  responses:
    Unauthorized:
      description: Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  message:
                    type: string
                    example: >-
                      Unable to authenticate user.
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  message:
                    type: string
                    example: Resource not found.
    UnprocessableEntity:
      description: >-
        The request was well-formed but contained validation errors.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  id:
                    type: integer
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                  full_messages:
                    type: array
                    items:
                      type: string
