              type: integer
            uuid:
              type: string
              description: >-
                Subscription manager UUID for the host.
            registered_at:
              type: string
              format: date-time
            last_checkin:
              type:
                - string
                - 'null'
              format: date-time
            service_level:
              type:
                - string
                - 'null'
            release_version:
              type:
                - string
                - 'null'
            autoheal:
              type: boolean
            registered_through:
              type:
                - string
                - 'null'
        interfaces:
          type: array
          description: Network interfaces associated with the host.
          items:
            $ref: '#/components/schemas/HostInterface'
        puppetclasses:
          type: array
          items:
            type: object
        all_puppetclasses:
          type: array
          items:
            type: object
        created_at:
          type: string
          format: date-time
          description: Timestamp when the host was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the host was last updated.
        installed_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when the host OS was installed.
        last_report:
          type:
            - string
            - 'null'
          format: date-time
          description: >-
            Timestamp of the last configuration management report.
    HostCreate:
      type: object
      description: Parameters for creating a new host.
      required:
        - name
        - organization_id
        - location_id
      properties:
        name:
          type: string
          description: Hostname or FQDN.
        location_id:
          type: integer
          description: Location identifier.
        organization_id:
          type: integer
          description: Organization identifier.
        ip:
          type: string
          description: IPv4 address (not required when using DHCP proxy).
          format: ipv4
        mac:
          type: string
          description: >-
            MAC address (required for managed bare metal hosts).
        architecture_id:
          type: integer
          description: Architecture identifier (required if managed).
        domain_id:
          type: integer
          description: Domain identifier (required if managed).
        subnet_id:
          type: integer
          description: Subnet identifier (required if managed).
        operatingsystem_id:
          type: integer
          description: Operating system identifier (required if managed).
        medium_id:
          type: integer
          description: >-
            Installation medium identifier (required for non-image
            provisioning if managed).
        ptable_id:
          type: integer
          description: >-
            Partition table identifier (required if managed and no
            custom partition layout).
        compute_resource_id:
          type: integer
          description: >-
            Compute resource identifier. Null indicates bare metal.
        compute_profile_id:
          type: integer
          description: Compute profile identifier.
        hostgroup_id:
          type: integer
          description: Host group identifier.
        root_pass:
          type: string
          description: Root password (required if managed unless inherited).
          format: password
        owner_id:
          type: integer
          description: Owner identifier.
        owner_type:
          type: string
          description: Owner type.
          enum:
            - User
            - Usergroup
        build:
          type: boolean
          description: Enable build mode for provisioning.
        managed:
          type: boolean
          description: >-
            Whether the host should be managed by Satellite.
        comment:
          type: string
          description: Additional information about the host.
        content_facet_attributes:
          type: object
          properties:
            content_view_id:
              type: integer
              description: Content view identifier.
            lifecycle_environment_id:
              type: integer
              description: Lifecycle environment identifier.
            content_source_id:
              type: integer
              description: Content source (Capsule) identifier.
        interfaces_attributes:
          type: array
          description: Network interface configurations.
          items:
            $ref: '#/components/schemas/HostInterfaceCreate'
    HostUpdate:
      type: object
      description: Parameters for updating an existing host.
      properties:
        name:
          type: string
        ip:
          type: string
          format: ipv4
        mac:
          type: string
        architecture_id:
          type: integer
        domain_id:
          type: integer
        subnet_id:
          type: integer
        operatingsystem_id:
          type: integer
        hostgroup_id:
          type: integer
        location_id:
          type: integer
        organization_id:
          type: integer
        owner_id:
          type: integer
        owner_type:
          type: string
          enum:
            - User
            - Usergroup
        build:
          type: boolean
        managed:
          type: boolean
        comment:
          type: string
        content_facet_attributes:
          type: object
          properties:
            content_view_id:
              type: integer
            lifecycle_environment_id:
              type: integer
            content_source_id:
              type: integer
        interfaces_attributes:
          type: array
          items:
            $ref: '#/components/schemas/HostInterfaceCreate'
    HostInterface:
      type: object
      description: A network interface associated with a host.
      properties:
        id:
          type: integer
        mac:
          type:
            - string
            - 'null'
        ip:
          type:
            - string
            - 'null'
          format: ipv4
        ip6:
          type:
            - string
            - 'null'
          format: ipv6
        type:
          type: string
          enum:
            - interface
            - bmc
            - bond
            - bridge
        name:
          type:
            - string
            - 'null'
        subnet_id:
          type:
            - integer
            - 'null'
        subnet6_id:
          type:
            - integer
            - 'null'
        domain_id:
          type:
            - integer
            - 'null'
        identifier:
          type:
            - string
            - 'null'
          description: Device identifier (e.g., eth0, ens192).
        managed:
          type: boolean
        primary:
          type: boolean
        provision:
          type: boolean
        virtual:
          type: boolean
        tag:
          type:
            - string
            - 'null'
          description: VLAN tag.
        mtu:
          type:
            - integer
            - 'null'
          description: Maximum transmission unit.
        attached_to:
          type:
            - string
            - 'null'
          description: Parent interface identifier.
    HostInterfaceCreate:
      type: object
      description: Parameters for creating or updating a host network interface.
      properties:
        id:
          type: integer
          description: >-
            Interface identifier (for updating existing interfaces).
        mac:
          type: string
          description: MAC address.
        ip:
          type: string
          description: IPv4 address.
          format: ipv4
        ip6:
          type: string
          description: IPv6 address.
          format: ipv6
        type:
          type: string
          description: Interface type.
          enum:
            - interface
            - bmc
            - bond
            - bridge
        name:
          type: string
          description: DNS name.
        subnet_id:
          type: integer
          description: IPv4 subnet identifier.
        subnet6_id:
          type: integer
          description: IPv6 subnet identifier.
        domain_id:
          type: integer
          description: Domain identifier.
        identifier:
          type: string
          description: Device identifier (e.g., eth0).
        managed:
          type: boolean
          description: Whether DNS and DHCP are managed for this interface.
        primary:
          type: boolean
          description: Whether this is the primary interface for FQDN.
        provision:
          type: boolean
          description: Whether this interface is used for provisioning.
        virtual:
          type: boolean
          description: Whether this is a virtual interface (alias or VLAN).
        tag:
          type: string
          description: VLAN tag.
        mtu:
          type: integer
          description: Maximum transmission unit.
        attached_to:
          type: string
          description: Parent interface identifier.
        username:
          type: string
          description: BMC username (BMC interfaces only).
        password:
          type: string
          description: BMC password (BMC interfaces only).
          format: password
        provider:
          type: string
          description: BMC provider (BMC interfaces only).
          enum:
            - IPMI
            - Redfish
            - SSH
        mode:
          type: string
          description: Bond mode (bond interfaces only).
          enum:
            - balance-rr
            - active-backup
            - balance-xor
            - broadcast
            - '802.3ad'
            - balance-tlb
            - balance-alb
        attached_devices:
          type: array
          description: >-
            Slave or bridge member interface identifiers.
          items:
            type: string
        bond_options:
          type: string
          description: Additional bond options (space-separated).
    ContentView:
      type: object
      description: >-
        A content view defining a curated set of repositories and content
        available to hosts.
      properties:
        id:
          type: integer
          description: Unique identifier for the content view.
        name:
          type: string
          description: Name of the content view.
        label:
          type: string
          description: >-
            Unique label for the content view (auto-generated from name).
        description:
          type:
            - string
            - 'null'
          description: Description of the content view.
        organization_id:
          type: integer
          description: Organization this content view belongs to.
        organization:
          type: object
          properties:
            name:
              type: string
            label:
              type: string
            id:
              type: integer
        composite:
          type: boolean
          description: >-
            Whether this is a composite content view combining other
            content view versions.
        rolling:
          type: boolean
          description: Whether this is a rolling content view.
        auto_publish:
          type: boolean
          description: >-
            Whether composite content views auto-publish when a component
            is updated.
        solve_dependencies:
          type: boolean
          description: >-
            Whether RPM dependencies are resolved during publish.
        import_only:
          type: boolean
          description: >-
            Whether this content view is only for upstream imports.
        generated_for:
          type:
            - string
            - 'null'
          description: >-
            If generated, indicates the purpose (e.g., import or export).
        default:
          type: boolean
          description: >-
            Whether this is the default content view (every organization
            has one).
        repository_ids:
          type: array
          description: Identifiers of repositories in this content view.
          items:
            type: integer
        repositories:
          type: array
          description: Repositories included in this content view.
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              label:
                type: string
              content_type:
                type: string
        component_ids:
          type: array
          description: >-
            Content view version IDs for composite content views.
          items:
            type: integer
        versions:
          type: array
          description: Published versions of this content view.
          items:
            type: object
            properties:
              id:
                type: integer
              version:
                type: string
              published:
                type: string
                format: date-time
              environment_ids:
                type: array
                items:
                  type: integer
        environments:
          type: array
          description: Lifecycle environments this content view is in.
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              label:
                type: string
        activation_keys:
          type: array
          description: Activation keys using this content view.
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
        next_version:
          type: string
          description: Next version number to be published.
        last_published:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp of the last publish.
        latest_version:
          type:
            - string
            - 'null'
          description: Latest published version number.
        latest_version_id:
          type:
            - integer
            - 'null'
          description: Identifier of the latest published version.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ContentViewCreate:
      type: object
      description: Parameters for creating a new content view.
      required:
        - name
        - organization_id
      properties:
        organization_id:
          type: integer
          description: Organization identifier.
        name:
          type: string
          description: Name of the content view.
        label:
          type: string
          description: >-
            Content view label (auto-generated from name if omitted).
        description:
          type: string
          description: Description of the content view.
        composite:
          type: boolean
          description: Whether this is a composite content view.
          default: false
        rolling:
          type: boolean
          description: Whether this is a rolling content view.
          default: false
        auto_publish:
          type: boolean
          description: >-
            Auto-publish composite view when a component updates.
          default: false
        solve_dependencies:
          type: boolean
          description: Resolve RPM dependencies during publish.
          default: false
        import_only:
          type: boolean
          description: Mark as import-only content view.
          default: false
        repository_ids:
          type: array
          description: Repository IDs to include.
          items:
            type: integer
        component_ids:
          type: array
          description: >-
            Content view version IDs for composite views.
          items:
            type: integer
        environment_ids:
          type: array
          description: >-
            Lifecycle environment IDs for rolling content views.
          items:
            type: integer
    ContentViewUpdate:
      type: object
      description: Parameters for updating a content view.
      properties:
        name:
          type: string
        description:
          type: string
        auto_publish:
          type: boolean
        solve_dependencies:
          type: boolean
        repository_ids:
          type: array
          items:
            type: integer
        component_ids:
          type: array
          items:
            type: integer
        environment_ids:
          type: array
          items:
            type: integer
    Subscription:
      type: object
      description: >-
        A Red Hat subscription providing product entitlements for an
